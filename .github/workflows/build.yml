on:
  push:
  pull_request:

name: build
jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: 20

    - name: Install Dependencies
      run: npm install

    - name: Build
      run: npm run build

    - name: Upload site
      uses: actions/upload-artifact@v4
      with:
        name: site
        path: docs/.vitepress/dist
