on:
  pull_request_target:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number whose preview deployments should be deleted'
        required: true
        type: string

name: preview-cleanup
run-name: preview-cleanup - PR ${{ '#' }}${{ inputs.pr_number || github.event.pull_request.number }}

permissions: {}

jobs:
  delete-preview:
    name: delete-preview
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.fork == true
    env:
      PR_NUMBER: ${{ inputs.pr_number || github.event.pull_request.number }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
    - name: Install wrangler
      run: npm install --global wrangler@4

    - name: Delete preview deployments for PR
      run: |
        DEPLOYMENTS_JSON="$(wrangler pages deployment list --project-name=kopernicus-wiki-preview --json)"
        DEPLOYMENT_IDS="$(echo "$DEPLOYMENTS_JSON" | jq -r --arg branch "pr-$PR_NUMBER" '.[] | select(.Branch == $branch) | .Id')"

        for id in $DEPLOYMENT_IDS; do
          wrangler pages deployment delete --project-name=kopernicus-wiki-preview --force "$id"
        done
